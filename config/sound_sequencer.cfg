server :
{
    title = "sound_sequencer";
    admin_socket = "/tmp/sound_sequencer_admin.sock";
    ordinary_port = 19090;
    api_port = 19091;
    admin_timeout = 300;
    output_dir = "output";
};

audio :
{
    composition_name = "demo_string_layers";
    sample_rate = 44100;
};

layers =
(
    {
        instrument = "violin";
        notes = "A3";
        effect = "reverb:light";
        input_file = "Sounds/violin-wav/violin_A3_025_forte_arco-normal.wav";
        workload_ms = 120;
    },
    {
        instrument = "violin";
        notes = "A3-mezzo";
        effect = "chorus:light";
        input_file = "Sounds/violin-wav/violin_A3_025_mezzo-forte_arco-normal.wav";
        workload_ms = 180;
    },
    {
        instrument = "cello";
        notes = "A2";
        effect = "lowpass";
        input_file = "Sounds/cello-wav/cello_A2_025_forte_arco-normal.wav";
        workload_ms = 220;
    },
    {
        instrument = "cello";
        notes = "A2-mezzo";
        effect = "delay:80";
        input_file = "Sounds/cello-wav/cello_A2_025_mezzo-piano_arco-normal.wav";
        workload_ms = 200;
    }
);